services:
  - type: web
    name: riyada
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && cd backend && npm install --include=dev && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push --accept-data-loss && npx ts-node prisma/seed.ts && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: riyada-db
          property: connectionString

databases:
  - name: riyada-db
    plan: free
