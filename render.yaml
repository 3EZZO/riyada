services:
  - type: web
    name: riyada
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push --accept-data-loss && npx prisma db seed && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: riyada-db
          property: connectionString

databases:
  - name: riyada-db
    plan: free
